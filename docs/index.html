<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>terazi — Turkish LLM Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1e1e26;
    --bg-deep: #18181f;
    --bg-surface: #252530;
    --bg-card: rgba(30, 30, 42, 0.7);
    --accent: #9b6bea;
    --accent-glow: rgba(155, 107, 234, 0.15);
    --accent-hover: #b48aff;
    --text: #e8e8f0;
    --text-secondary: #9494ab;
    --text-muted: #5e5e74;
    --border: rgba(155, 107, 234, 0.12);
    --border-strong: rgba(155, 107, 234, 0.25);
    --row-hover: rgba(155, 107, 234, 0.06);
    --pill-sat: 60%;
    --pill-lit: 55%;
    --pill-alpha: 0.15;
    --font-display: 'Chakra Petch', sans-serif;
    --font-body: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  [data-theme="light"] {
    --bg: #f4f3f0;
    --bg-deep: #eae8e3;
    --bg-surface: #ffffff;
    --bg-card: rgba(255, 255, 255, 0.85);
    --accent: #7044b5;
    --accent-glow: rgba(112, 68, 181, 0.08);
    --accent-hover: #5a33a0;
    --text: #1a1a24;
    --text-secondary: #5e5c6e;
    --text-muted: #9896a6;
    --border: rgba(112, 68, 181, 0.12);
    --border-strong: rgba(112, 68, 181, 0.22);
    --row-hover: rgba(112, 68, 181, 0.05);
    --pill-sat: 70%;
    --pill-lit: 38%;
    --pill-alpha: 0.1;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.3s, color 0.3s;
  }

  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent-hover); }

  .container { max-width: 1040px; margin: 0 auto; padding: 0 28px; width: 100%; }

  /* Header */
  .site-header {
    padding: 48px 0 32px;
    border-bottom: 1px solid var(--border);
  }
  .header-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .site-header h1 {
    font-family: var(--font-display);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--accent);
  }
  .site-header p {
    font-size: 0.85rem;
    color: var(--text-muted);
    max-width: 460px;
  }

  /* Theme toggle */
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 100;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border-strong);
    background: var(--bg-card);
    backdrop-filter: blur(12px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s;
  }
  .theme-toggle:hover { border-color: var(--accent); background: var(--accent-glow); }
  .theme-toggle svg { width: 16px; height: 16px; color: var(--text-secondary); }
  .theme-toggle:hover svg { color: var(--accent); }
  .icon-sun, .icon-moon { display: none; }
  [data-theme="dark"] .icon-sun { display: block; }
  [data-theme="light"] .icon-moon { display: block; }

  /* Main */
  main { flex: 1; padding: 28px 0 48px; }

  .loading-state, .error-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--text-muted);
    font-size: 0.88rem;
  }
  .error-state { color: #c45; }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-card);
    backdrop-filter: blur(12px);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 680px;
    table-layout: fixed;
  }

  col.col-rank  { width: 44px; }
  col.col-model { width: auto; }
  col.col-score { width: 96px; }

  thead th {
    background: var(--bg-surface);
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: 0.66rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    padding: 11px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    transition: color 0.2s;
  }
  thead th:hover { color: var(--text-secondary); }
  thead th.sort-active { color: var(--accent); }
  thead th .arrow { margin-left: 3px; font-size: 0.58rem; opacity: 0; }
  thead th.sort-active .arrow { opacity: 1; }
  thead th:not(.th-model) { text-align: center; }
  thead th:first-child { text-align: center; cursor: default; }
  thead th:first-child:hover { color: var(--text-muted); }

  tbody tr.model-row { cursor: pointer; transition: background 0.12s; }
  tbody tr.model-row:hover { background: var(--row-hover); }
  tbody tr.model-row td { border-bottom: 1px solid var(--border); }

  tbody td { padding: 10px 14px; font-size: 0.86rem; vertical-align: middle; }

  .rank-cell {
    text-align: center;
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.78rem;
    color: var(--text-muted);
  }
  .rank-1 .rn { color: #e6c44d; }
  .rank-2 .rn { color: #a0a4b4; }
  .rank-3 .rn { color: #c88a5a; }

  .model-cell {
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 0;
  }
  .mn { display: flex; align-items: center; gap: 7px; }
  .mp { color: var(--text-muted); font-weight: 400; }
  .mi { color: var(--text); font-weight: 500; }

  .chv {
    display: flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; flex-shrink: 0;
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .chv svg { width: 11px; height: 11px; fill: none; stroke: var(--text-muted); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  tr.model-row:hover .chv svg { stroke: var(--text-secondary); }
  tr.model-row.expanded .chv { transform: rotate(90deg); }
  tr.model-row.expanded .chv svg { stroke: var(--accent); }

  .sc { text-align: center; font-family: var(--font-mono); font-size: 0.78rem; }

  /* Pills */
  .pill {
    display: inline-block;
    padding: 2px 0;
    border-radius: 3px;
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.74rem;
    min-width: 50px;
    text-align: center;
    line-height: 1.2;
  }
  .pill-na { color: var(--text-muted); font-weight: 400; background: none; }

  /* Detail row */
  tr.detail-row { display: none; }
  tr.detail-row.open { display: table-row; }
  tr.detail-row td { padding: 0; border-bottom: 1px solid var(--border); }

  .detail-inner { padding: 16px 20px; background: var(--bg-deep); }
  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }
  .dc {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-card);
    overflow: hidden;
  }
  .dc:hover { border-color: var(--border-strong); }
  .dc-h {
    padding: 7px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-secondary);
  }
  .ds-list { padding: 2px 0; }
  .ds-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 10px;
    font-size: 0.78rem;
  }
  .ds-row:not(:last-child) { border-bottom: 1px solid var(--border); }
  .ds-name { color: var(--text-secondary); font-size: 0.76rem; margin-right: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ds-val { font-family: var(--font-mono); font-weight: 500; font-size: 0.72rem; flex-shrink: 0; }

  /* Mobile */
  @media (max-width: 800px) {
    .container { padding: 0 16px; }
    .site-header p { display: none; }
    thead th:nth-child(1), tbody td:nth-child(1) { position: sticky; left: 0; z-index: 5; background: var(--bg-surface); }
    thead th:nth-child(2), tbody td:nth-child(2) { position: sticky; left: 44px; z-index: 5; background: var(--bg-surface); border-right: 1px solid var(--border); }
    thead th:nth-child(1), thead th:nth-child(2) { z-index: 11; }
  }

  /* Footer */
  .site-footer { padding: 20px 0; border-top: 1px solid var(--border); }
  .footer-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  .footer-ts { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted); }
  .footer-link { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; color: var(--text-muted); }
  .footer-link:hover { color: var(--accent); }
  .footer-link svg { width: 14px; height: 14px; fill: currentColor; }
</style>
</head>
<body>

<button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<header class="site-header">
  <div class="container">
    <div class="header-row">
      <h1>terazi</h1>
      <p>Benchmark for evaluating LLMs on Turkish-language tasks across core reasoning, tool use, finance, and legal domains.</p>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <div id="app">
      <div class="loading-state">Loading</div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-inner">
      <span class="footer-ts" id="last-updated"></span>
      <a class="footer-link" href="https://github.com/selimozten/terazi" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        selimozten/terazi
      </a>
    </div>
  </div>
</footer>

<script>
(function () {
  "use strict";

  var html = document.documentElement;
  var stored = localStorage.getItem("terazi-theme");
  if (stored) html.setAttribute("data-theme", stored);
  else if (window.matchMedia("(prefers-color-scheme: light)").matches) html.setAttribute("data-theme", "light");

  document.getElementById("theme-toggle").addEventListener("click", function () {
    var next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
    html.setAttribute("data-theme", next);
    localStorage.setItem("terazi-theme", next);
  });

  var CATS = { core: "Core", tool: "Tool", fin: "Fin", legal: "Legal" };
  var data = null, sortKey = "average", sortAsc = false, expanded = new Set();

  function sc(s) {
    if (s == null) return null;
    var sat = getComputedStyle(html).getPropertyValue("--pill-sat").trim() || "60%";
    var lit = getComputedStyle(html).getPropertyValue("--pill-lit").trim() || "55%";
    return "hsl(" + (s*120) + "," + sat + "," + lit + ")";
  }
  function sa(s) {
    if (s == null) return "transparent";
    var sat = getComputedStyle(html).getPropertyValue("--pill-sat").trim() || "60%";
    var a = getComputedStyle(html).getPropertyValue("--pill-alpha").trim() || "0.15";
    return "hsla(" + (s*120) + "," + sat + ",50%," + a + ")";
  }
  function f(v) { return v == null ? null : v.toFixed(3); }
  function pill(s) {
    if (s == null) return '<span class="pill pill-na">--</span>';
    return '<span class="pill" style="color:'+sc(s)+';background:'+sa(s)+'">'+f(s)+'</span>';
  }
  function pretty(n) { return n.replace(/_/g," ").replace(/\b\w/g,function(c){return c.toUpperCase();}); }
  function chev() { return '<span class="chv"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></span>'; }
  function split(n) { var i=n.indexOf("/"); return i<0?{p:"",id:n}:{p:n.substring(0,i+1),id:n.substring(i+1)}; }
  function esc(s) { var d=document.createElement("div"); d.appendChild(document.createTextNode(s)); return d.innerHTML; }

  function gs(m,k) {
    if (k==="average") return m.average!=null?m.average:-Infinity;
    return m.results&&m.results[k]&&m.results[k].overall!=null?m.results[k].overall:-Infinity;
  }
  function doSort(models) {
    var s=models.slice();
    if (sortKey==="name") s.sort(function(a,b){var x=a.name.toLowerCase(),y=b.name.toLowerCase();return x<y?(sortAsc?-1:1):x>y?(sortAsc?1:-1):0;});
    else s.sort(function(a,b){var x=gs(a,sortKey),y=gs(b,sortKey);return x===y?0:sortAsc?x-y:y-x;});
    return s;
  }

  function render() {
    var app=document.getElementById("app");
    if (!data||!data.models||!data.models.length) { app.innerHTML='<div class="error-state">No data.</div>'; return; }
    var cats=data.categories||Object.keys(CATS), sorted=doSort(data.models);
    var h='<div class="table-wrap"><table><colgroup><col class="col-rank"><col class="col-model">';
    for (var i=0;i<1+cats.length;i++) h+='<col class="col-score">';
    h+='</colgroup><thead><tr><th>#</th>';
    h+='<th class="th-model'+(sortKey==="name"?" sort-active":"")+'" data-sort="name">Model<span class="arrow">'+(sortKey==="name"?(sortAsc?"&#9650;":"&#9660;"):"")+'</span></th>';
    h+='<th class="'+(sortKey==="average"?"sort-active":"")+'" data-sort="average">Avg<span class="arrow">'+(sortKey==="average"?(sortAsc?"&#9650;":"&#9660;"):"")+'</span></th>';
    for (var i=0;i<cats.length;i++){var c=cats[i];h+='<th class="'+(sortKey===c?"sort-active":"")+'" data-sort="'+c+'">'+(CATS[c]||c)+'<span class="arrow">'+(sortKey===c?(sortAsc?"&#9650;":"&#9660;"):"")+'</span></th>';}
    h+='</tr></thead><tbody>';

    for (var i=0;i<sorted.length;i++) {
      var m=sorted[i],rank=i+1,ex=expanded.has(m.name),rc=rank<=3?" rank-"+rank:"",nm=split(m.name);
      h+='<tr class="model-row'+(ex?" expanded":"")+'" data-model="'+esc(m.name)+'">';
      h+='<td class="rank-cell'+rc+'"><span class="rn">'+rank+'</span></td>';
      h+='<td class="model-cell"><div class="mn">'+chev()+'<span><span class="mp">'+esc(nm.p)+'</span><span class="mi">'+esc(nm.id)+'</span></span></div></td>';
      h+='<td class="sc">'+pill(m.average)+'</td>';
      for (var ci=0;ci<cats.length;ci++){var v=m.results&&m.results[cats[ci]]?m.results[cats[ci]].overall:null;h+='<td class="sc">'+pill(v)+'</td>';}
      h+='</tr>';

      h+='<tr class="detail-row'+(ex?" open":"")+'"><td colspan="'+(3+cats.length)+'"><div class="detail-inner"><div class="detail-grid">';
      for (var ci=0;ci<cats.length;ci++){
        var cat=cats[ci],cr=m.results?m.results[cat]:null;
        if(!cr)continue;
        h+='<div class="dc"><div class="dc-h"><span>'+(CATS[cat]||cat)+'</span>'+pill(cr.overall)+'</div><div class="ds-list">';
        if(cr.per_subcategory){var sk=Object.keys(cr.per_subcategory).sort();for(var si=0;si<sk.length;si++){var sv=cr.per_subcategory[sk[si]];h+='<div class="ds-row"><span class="ds-name">'+esc(pretty(sk[si]))+'</span><span class="ds-val" style="color:'+sc(sv)+'">'+f(sv)+'</span></div>';}}
        h+='</div></div>';
      }
      h+='</div></div></td></tr>';
    }
    h+='</tbody></table></div>';
    app.innerHTML=h;
    document.querySelectorAll("thead th[data-sort]").forEach(function(th){th.addEventListener("click",function(e){var k=e.currentTarget.getAttribute("data-sort");if(k===sortKey)sortAsc=!sortAsc;else{sortKey=k;sortAsc=k==="name";}render();});});
    document.querySelectorAll("tr.model-row").forEach(function(tr){tr.addEventListener("click",function(e){var n=e.currentTarget.getAttribute("data-model");expanded.has(n)?expanded.delete(n):expanded.add(n);render();});});
  }

  fetch("data.json").then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}).then(function(j){
    data=j;
    var el=document.getElementById("last-updated");
    if(data.generated_at){var d=new Date(data.generated_at);el.textContent="Updated "+d.toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"});}
    render();
  }).catch(function(e){document.getElementById("app").innerHTML='<div class="error-state">'+esc(e.message)+'</div>';});
})();
</script>
</body>
</html>
